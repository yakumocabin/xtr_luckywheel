  /* floating blobs */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.45;
    pointer-events: none;
    z-index: 0;
  }
  /* overlay for readability */
  body .overlay {
    position: fixed; inset: 0;
    background: rgba(255, 230, 240, 0.55);
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 420px; height: 420px;
    background: radial-gradient(circle, #ff9ec4, #ffcce0);
    top: -100px; left: -100px;
  }
  body::after {
    width: 380px; height: 380px;
    background: radial-gradient(circle, #b5d8ff, #d9c6ff);
    bottom: -80px; right: -80px;
  }

  .page-wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    width: 100%;
    max-width: 520px;
  }

  h1 {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 2.6rem;
    color: #d63a6e;
    text-shadow: 0 2px 8px rgba(214,58,110,0.18), 0 1px 0 #fff;
    letter-spacing: 2px;
  }

  /* Wheel wrapper */
  .wheel-wrap {
    position: relative;
    width: 360px;
    height: 360px;
    filter: drop-shadow(0 12px 32px rgba(214,58,110,0.22));
  }

  canvas#wheel {
    display: block;
    border-radius: 50%;
    transition: transform 4s cubic-bezier(0.17, 0.87, 0.32, 1);
  }

  /* Pointer arrow */
  .pointer {
    position: absolute;
    top: -22px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-top: 42px solid #d63a6e;
    filter: drop-shadow(0 4px 8px rgba(214,58,110,0.4));
    z-index: 10;
  }

  /* Center hub */
  .hub {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 48px; height: 48px;
    background: radial-gradient(circle at 35% 35%, #fff 0%, #ffd6e7 60%, #ff8eb3 100%);
    border-radius: 50%;
    border: 4px solid #fff;
    box-shadow: 0 4px 16px rgba(214,58,110,0.3);
    z-index: 10;
    pointer-events: none;
  }

  /* Spin button */
  #spin-btn {
    padding: 16px 52px;
    font-size: 1.2rem;
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 700;
    background: linear-gradient(135deg, #ff6b9d 0%, #ff3c72 100%);
    color: #fff;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(255,60,114,0.38), inset 0 1px 0 rgba(255,255,255,0.25);
    transition: transform 0.2s, box-shadow 0.2s;
    letter-spacing: 1px;
  }
  #spin-btn:hover:not(:disabled) {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 14px 32px rgba(255,60,114,0.45);
  }
  #spin-btn:active:not(:disabled) { transform: translateY(1px); }
  #spin-btn:disabled {
    background: linear-gradient(135deg, #e0e0e0, #c8c8c8);
    cursor: not-allowed;
    box-shadow: none;
  }

  /* Result box */
  #result {
    background: rgba(255,255,255,0.82);
    backdrop-filter: blur(10px);
    border: 1.5px solid rgba(255,150,180,0.3);
    border-radius: 18px;
    padding: 18px 32px;
    font-size: 1.25rem;
    color: #444;
    text-align: center;
    width: 100%;
    box-shadow: 0 6px 24px rgba(214,58,110,0.10);
    min-height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.4s;
  }
  #result.win {
    background: linear-gradient(135deg, rgba(255,235,245,0.95), rgba(255,245,250,0.95));
    border-color: #ff6b9d;
    font-size: 1.35rem;
    color: #c2185b;
  }
  #result strong { color: #d63a6e; }

  /* Prize chips */
  .prize-grid {
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(8px);
    border: 1.5px solid rgba(255,150,180,0.2);
    border-radius: 18px;
    padding: 20px 24px;
    width: 100%;
    box-shadow: 0 4px 16px rgba(214,58,110,0.08);
  }
  .prize-grid h3 {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 1.25rem;
    color: #d63a6e;
    margin-bottom: 14px;
    text-align: center;
    letter-spacing: 1px;
  }
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }
  .chip {
    background: linear-gradient(135deg, #ffe0ec, #ffd6f5);
    border: 1px solid rgba(255,107,157,0.3);
    color: #c2185b;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.9rem;
    transition: transform 0.2s;
  }
  .chip.won {
    background: linear-gradient(135deg, #ff6b9d, #ff3c72);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 4px 12px rgba(255,60,114,0.3);
    transform: scale(1.08);
  }

  .footer {
    color: #bbb;
    font-size: 0.78rem;
    text-align: center;
  }
</style>
</head>
<body>

<div class="overlay"></div>
<div class="page-wrapper">
  <h1>球球的幸运小转盘</h1>

  <div class="wheel-wrap">
    <div class="pointer"></div>
    <canvas id="wheel" width="360" height="360"></canvas>
    <div class="hub"></div>
  </div>

  <button id="spin-btn" onclick="spin()">开始抽奖 ✨</button>

  <div id="result">点击按钮开始旋转～</div>

  <div class="prize-grid">
    <h3>🎀 奖品列表</h3>
    <div class="chips" id="chips"></div>
  </div>

  <p class="footer">每次抽奖后转盘将锁定 · 刷新页面可重置</p>
</div>

<script>
const prizes = [
  "司美格鲁肽",
  "登山鞋",
  "登山杖",
  "登山包",
  "护膝",
  "自行车",
  "攀岩鞋",
  "安全带",
  "镁粉"
];

const COLORS = [
  '#FF6B9D','#FF8E53','#FFD166',
  '#06D6A0','#118AB2','#9D4EDD',
  '#FF595E','#1982C4','#8AC926'
];

const canvas  = document.getElementById('wheel');
const ctx     = canvas.getContext('2d');
const R       = canvas.width / 2;
let   currentAngle = 0; // total rotation so far (radians)
let   spinning = false;
let   locked   = false;

// ─── Draw wheel at given rotation offset (radians) ───────────────────────────
function drawWheel(rotOffset) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const n = prizes.length;
  const arc = (2 * Math.PI) / n;

  for (let i = 0; i < n; i++) {
    const startAngle = rotOffset + i * arc;
    const endAngle   = startAngle + arc;

    // Sector fill
    ctx.beginPath();
    ctx.moveTo(R, R);
    ctx.arc(R, R, R - 2, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.fill();

    // Subtle sector divider
    ctx.beginPath();
    ctx.moveTo(R, R);
    ctx.arc(R, R, R - 2, startAngle, endAngle);
    ctx.closePath();
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Text label
    ctx.save();
    ctx.translate(R, R);
    ctx.rotate(startAngle + arc / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#fff';
    ctx.shadowColor = 'rgba(0,0,0,0.3)';
    ctx.shadowBlur  = 3;
    ctx.font = 'bold 15px "Noto Sans SC", sans-serif';
    ctx.fillText(prizes[i], R - 18, 5);
    ctx.restore();
  }

  // Outer ring
  ctx.beginPath();
  ctx.arc(R, R, R - 2, 0, 2 * Math.PI);
  ctx.strokeStyle = 'rgba(255,255,255,0.7)';
  ctx.lineWidth = 4;
  ctx.stroke();
}

// ─── Prize chips ─────────────────────────────────────────────────────────────
function initChips() {
  const wrap = document.getElementById('chips');
  prizes.forEach((p, i) => {
    const d = document.createElement('div');
    d.className = 'chip';
    d.id = `chip-${i}`;
    d.textContent = p;
    wrap.appendChild(d);
  });
}

// ─── Spin ─────────────────────────────────────────────────────────────────────
function spin() {
  if (locked)   { alert('已经抽过啦 😝'); return; }
  if (spinning) { return; }

  spinning = true;
  document.getElementById('spin-btn').disabled = true;
  document.getElementById('result').className  = '';
  document.getElementById('result').innerHTML  = '旋转中…';

  const n          = prizes.length;
  const arc        = (2 * Math.PI) / n;
  const prizeIndex = Math.floor(Math.random() * n);

  // Pointer is at the TOP (−π/2). We want sector[prizeIndex]'s midpoint to land there.
  // Sector[i] midpoint (in wheel coords) = i * arc + arc/2
  // After rotation R the angle at top = sectorMid + R (mod 2π) = −π/2 (≡ 3π/2)
  // → R = 3π/2 − (sectorMid) + extra full turns
  const sectorMid   = prizeIndex * arc + arc / 2;
  const extraTurns  = (4 + Math.floor(Math.random() * 3)) * 2 * Math.PI;
  const targetAngle = extraTurns + (3 * Math.PI / 2) - sectorMid;

  const startAngle  = currentAngle;
  const deltaAngle  = targetAngle; // always positive full turns + adjustment
  const duration    = 4000; // ms
  let   startTime   = null;

  function easeOut(t) {
    // cubic ease-out
    return 1 - Math.pow(1 - t, 3);
  }

  function animate(ts) {
    if (!startTime) startTime = ts;
    const elapsed = ts - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const angle = startAngle + deltaAngle * easeOut(progress);
    currentAngle = angle;
    drawWheel(angle);

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      // Done
      spinning = false;
      locked   = true;

      const prize = prizes[prizeIndex];
      const result = document.getElementById('result');
      result.className = 'win';
      result.innerHTML = `✨ 恭喜抽到：<strong>${prize}</strong> ✨`;

      document.getElementById(`chip-${prizeIndex}`).classList.add('won');

      const btn = document.getElementById('spin-btn');
      btn.disabled    = false;
      btn.textContent = '已抽奖 🎉';
      btn.disabled    = true;
    }
  }

  requestAnimationFrame(animate);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
initChips();
drawWheel(0);
</script>
</body>
</html>
